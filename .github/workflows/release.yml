name: Release macOS App

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Release
    runs-on: macos-15
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Extract version
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing NetBar version: $VERSION"

      - name: Update version in Info.plist
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ steps.version.outputs.version }}" Resources/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ steps.version.outputs.version }}" Resources/Info.plist

      - name: Build macOS App
        run: |
          chmod +x Scripts/build-app.sh
          ./Scripts/build-app.sh

      - name: Verify build
        run: |
          test -d "build/NetBar.app" || { echo "Build failed"; exit 1; }
          test -x "build/NetBar.app/Contents/MacOS/NetBar" || { echo "Executable not found"; exit 1; }
          echo "Build verified: $(du -sh build/NetBar.app)"

      - name: Package
        id: package
        run: |
          mkdir -p dist
          /usr/bin/ditto -c -k --keepParent build/NetBar.app dist/NetBar.app.zip
          cd dist
          shasum -a 256 NetBar.app.zip > NetBar.app.zip.sha256
          SHA256=$(awk '{print $1}' NetBar.app.zip.sha256)
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
          echo "Package contents:"
          ls -lh

      - name: Extract release notes
        env:
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          python3 - <<'PY'
          import os
          import pathlib
          import sys

          tag = os.environ["TAG"]
          version = os.environ["VERSION"]
          changelog_path = pathlib.Path("CHANGELOG.md")
          lines = changelog_path.read_text(encoding="utf-8").splitlines()

          capturing = False
          notes = []
          for line in lines:
              if line.startswith("## "):
                  heading = line[3:].strip()
                  if capturing:
                      break
                  if heading.startswith(tag) or heading.startswith(f"v{version}") or heading.startswith(version):
                      capturing = True
                      continue
              elif capturing:
                  notes.append(line)

          body = "\n".join(notes).strip()
          if not body:
              print(f"Release notes for {tag} were not found in CHANGELOG.md", file=sys.stderr)
              sys.exit(1)

          pathlib.Path("dist").mkdir(exist_ok=True)
          pathlib.Path("dist/release-notes.md").write_text(body + "\n", encoding="utf-8")
          PY
          echo "Release notes:"
          cat dist/release-notes.md

      - name: Generate latest.json
        env:
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
          SHA256: ${{ steps.package.outputs.sha256 }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import pathlib

          tag = os.environ["TAG"]
          version = os.environ["VERSION"]
          sha256 = os.environ["SHA256"]
          manifest = {
              "version": version,
              "tag": tag,
              "asset": "NetBar.app.zip",
              "asset_url": f"https://github.com/sunnyhot/NetBar/releases/download/{tag}/NetBar.app.zip",
              "sha256": sha256,
              "notes": pathlib.Path("dist/release-notes.md").read_text(encoding="utf-8").strip(),
              "html_url": f"https://github.com/sunnyhot/NetBar/releases/tag/{tag}",
          }
          pathlib.Path("dist/latest.json").write_text(
              json.dumps(manifest, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8"
          )
          PY
          echo "Generated latest.json:"
          cat dist/latest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: NetBar ${{ steps.version.outputs.tag }}
          body_path: dist/release-notes.md
          files: |
            dist/NetBar.app.zip
            dist/NetBar.app.zip.sha256
            dist/latest.json
          draft: false
          prerelease: false

      - name: Run tests
        continue-on-error: true
        run: swift test
