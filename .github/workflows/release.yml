name: Release macOS App

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Release
    runs-on: macos-15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing NetBar version: $VERSION"

      - name: Update version in Info.plist
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ steps.version.outputs.version }}" Resources/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ steps.version.outputs.version }}" Resources/Info.plist

      - name: Build macOS App
        run: |
          chmod +x Scripts/build-app.sh
          ./Scripts/build-app.sh

      - name: Verify build
        run: |
          test -d "build/NetBar.app" || { echo "Build failed"; exit 1; }
          test -x "build/NetBar.app/Contents/MacOS/NetBar" || { echo "Executable not found"; exit 1; }
          echo "Build verified: $(du -sh build/NetBar.app)"

      - name: Package
        id: package
        run: |
          mkdir -p dist
          /usr/bin/ditto -c -k --keepParent build/NetBar.app dist/NetBar.app.zip
          cd dist
          shasum -a 256 NetBar.app.zip > NetBar.app.zip.sha256
          SHA256=$(awk '{print $1}' NetBar.app.zip.sha256)
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
          echo "Package contents:"
          ls -lh

      - name: Generate latest.json
        env:
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
          SHA256: ${{ steps.package.outputs.sha256 }}
        run: |
          ASSET_URL="https://github.com/sunnyhot/NetBar/releases/download/${TAG}/NetBar.app.zip"
          RELEASE_URL="https://github.com/sunnyhot/NetBar/releases/tag/${TAG}"
          NOTES="Release ${TAG}"
          cat > dist/latest.json <<MANIFEST_EOF
          {
            "version": "${VERSION}",
            "tag": "${TAG}",
            "asset": "NetBar.app.zip",
            "asset_url": "${ASSET_URL}",
            "sha256": "${SHA256}",
            "notes": "${NOTES}",
            "html_url": "${RELEASE_URL}"
          }
          MANIFEST_EOF
          echo "Generated latest.json:"
          cat dist/latest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: NetBar ${{ steps.version.outputs.tag }}
          files: |
            dist/NetBar.app.zip
            dist/NetBar.app.zip.sha256
            dist/latest.json
          draft: false
          prerelease: false

      - name: Run tests
        continue-on-error: true
        run: swift test
